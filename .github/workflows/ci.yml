name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build & lint each app (if present)
        run: |
          set -e
          found=0
          for dir in apps/*/; do
            if [ -f "${dir}package.json" ]; then
              found=1
              echo "::group::${dir}"
              (cd "$dir" && npm ci && npm run lint --if-present && npm run build --if-present)
              echo "::endgroup::"
            else
              echo "Skipping ${dir} (no package.json yet)"
            fi
          done
          if [ "$found" -eq 0 ]; then
            echo "No buildable apps found yet - nothing to do."
          fi
